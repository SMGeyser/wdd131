<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>
    <!-- Open Graph Facebook, LinkedIn, etc. -->
        <meta property="og:type" content="website">
        <meta property="og:title" content="Recipe Book">
        <meta property="og:description" content="A website for all of your recipe needs!">
        <meta property="og:url" content="Your URL">
        <meta property="og:image" content="social-preview-image.png"> 

    <!-- X Card -->
        <meta name="twitter:card" content="Social Preview Image">
        <meta name="twitter:title" content="Your Title">
        <meta name="twitter:description" content="Your Description">
        <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
        <link rel="icon" href="favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
        <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="recipe.js" defer></script>
</head>
<body>
    <header>
        <img src="recipe-book.png">
        <h1>RecipeBook</h1>          
    </header>
    
    <form class="search-bar">
        <input type="text" id="search" placeholder="Find a recipe">
        <hr>
        <button id="search-btn"><img src="https://wddbyui.github.io/wdd131/images/recipe1/search.svg"></button>
    </form>

    <hr>

    <div class="recipe-container"></div>         

    <footer>

        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="pinterest_icon.svg" alt="pinterest icon"></a>
        </div>   
        
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>
                
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>
    <link href="character-card.css" rel="stylesheet">
    <script src="character-card.js" defer></script>
</head>
<body>
    <div class="card">
        <img class="image" src="snortleblat.webp" alt="picture of the snortleblat">
        <h1 class="name">snortleblat</h1>
        <div class="stats">
            <p><strong>Class:</strong> Swamp Beast Diplomat</p>
            <p id="level"></p>
            <p id="health"></p>
        </div>
        <div class="buttons">
            <button id="attacked">Attacked</button>
            <button id="level-up">Level Up</button>
        </div>
    </div>
</body>
</html>
